<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AmberAgent mobile agent runtime overview</title>
  <desc id="desc">A diagram-style preview showing AmberAgent as a mobile agent runtime with chat, subagents, deep reading, tools, live artifacts, external CLI seats, and sync.</desc>
  <rect width="1400" height="760" rx="32" fill="#F7F4EC"/>
  <rect x="42" y="42" width="1316" height="676" rx="28" fill="#FFFDF7" stroke="#D9CDB8" stroke-width="2"/>

  <g transform="translate(86 86)">
    <rect width="340" height="588" rx="42" fill="#161512"/>
    <rect x="16" y="16" width="308" height="556" rx="32" fill="#FAF7EF"/>
    <circle cx="170" cy="40" r="6" fill="#6F675B"/>
    <text x="48" y="92" fill="#27231D" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Amber</text>
    <text x="48" y="122" fill="#7A7164" font-family="Inter, Arial, sans-serif" font-size="14">mobile agent runtime</text>

    <rect x="48" y="160" width="244" height="54" rx="22" fill="#EDE6DA"/>
    <text x="74" y="194" fill="#27231D" font-family="Inter, Arial, sans-serif" font-size="17">Plan a deep read on AI chips</text>

    <circle cx="62" cy="256" r="5" fill="#5D8B73"/>
    <text x="80" y="266" fill="#27231D" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700">AmberAgent</text>

    <rect x="78" y="292" width="196" height="40" rx="20" fill="#EAF2EB" stroke="#B8D3BF"/>
    <text x="102" y="318" fill="#375D48" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Deep reading</text>

    <rect x="78" y="348" width="212" height="40" rx="20" fill="#FFF1D6" stroke="#E5C071"/>
    <text x="102" y="374" fill="#7A5215" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Tool execution</text>

    <rect x="78" y="404" width="168" height="40" rx="20" fill="#E9EEF8" stroke="#BBC9E5"/>
    <text x="102" y="430" fill="#3E5277" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Subagents</text>

    <rect x="48" y="500" width="244" height="44" rx="22" fill="#FFFFFF" stroke="#E0D7C6"/>
    <text x="74" y="528" fill="#7A7164" font-family="Inter, Arial, sans-serif" font-size="16">/ ask, run, read, build</text>
  </g>

  <g transform="translate(496 94)">
    <text x="0" y="28" fill="#27231D" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="760">Built around agent work, not just chat</text>
    <text x="0" y="62" fill="#756B5D" font-family="Inter, Arial, sans-serif" font-size="17">A personal Android project for local-first, mobile-first AI workflows.</text>

    <g transform="translate(0 112)">
      <rect width="246" height="124" rx="18" fill="#F4F8F4" stroke="#C6D8C8"/>
      <circle cx="36" cy="38" r="12" fill="#6FA27F"/>
      <text x="60" y="43" fill="#253428" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Subagents</text>
      <text x="28" y="78" fill="#5F695F" font-family="Inter, Arial, sans-serif" font-size="14">Fixed or dynamic roles for</text>
      <text x="28" y="100" fill="#5F695F" font-family="Inter, Arial, sans-serif" font-size="14">delegated work on Android.</text>
    </g>

    <g transform="translate(280 112)">
      <rect width="246" height="124" rx="18" fill="#FFF7E9" stroke="#E7C982"/>
      <circle cx="36" cy="38" r="12" fill="#F0B84F"/>
      <text x="60" y="43" fill="#3A2B12" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Deep Read</text>
      <text x="28" y="78" fill="#74644B" font-family="Inter, Arial, sans-serif" font-size="14">Source collection, outlines,</text>
      <text x="28" y="100" fill="#74644B" font-family="Inter, Arial, sans-serif" font-size="14">sections, evidence, reports.</text>
    </g>

    <g transform="translate(560 112)">
      <rect width="246" height="124" rx="18" fill="#F2F5FB" stroke="#C7D2EA"/>
      <circle cx="36" cy="38" r="12" fill="#6F8ACB"/>
      <text x="60" y="43" fill="#28344F" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Tool Surfaces</text>
      <text x="28" y="78" fill="#626B80" font-family="Inter, Arial, sans-serif" font-size="14">Search, files, cards, local</text>
      <text x="28" y="100" fill="#626B80" font-family="Inter, Arial, sans-serif" font-size="14">actions, and permissions.</text>
    </g>

    <g transform="translate(0 274)">
      <rect width="246" height="124" rx="18" fill="#F8F2F7" stroke="#DFC3D9"/>
      <circle cx="36" cy="38" r="12" fill="#C36B9F"/>
      <text x="60" y="43" fill="#44243A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Live Artifacts</text>
      <text x="28" y="78" fill="#755F70" font-family="Inter, Arial, sans-serif" font-size="14">Preview generated HTML,</text>
      <text x="28" y="100" fill="#755F70" font-family="Inter, Arial, sans-serif" font-size="14">slides, and rich outputs.</text>
    </g>

    <g transform="translate(280 274)">
      <rect width="246" height="124" rx="18" fill="#F2F7F7" stroke="#BFD8D7"/>
      <circle cx="36" cy="38" r="12" fill="#5D9B9A"/>
      <text x="60" y="43" fill="#203B3A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">External CLI</text>
      <text x="28" y="78" fill="#607170" font-family="Inter, Arial, sans-serif" font-size="14">Verified seats for local</text>
      <text x="28" y="100" fill="#607170" font-family="Inter, Arial, sans-serif" font-size="14">developer runtimes.</text>
    </g>

    <g transform="translate(560 274)">
      <rect width="246" height="124" rx="18" fill="#F6F4EF" stroke="#D8CEC0"/>
      <circle cx="36" cy="38" r="12" fill="#8E7C67"/>
      <text x="60" y="43" fill="#362F27" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Sync &amp; State</text>
      <text x="28" y="78" fill="#6C6258" font-family="Inter, Arial, sans-serif" font-size="14">Preserve personal config,</text>
      <text x="28" y="100" fill="#6C6258" font-family="Inter, Arial, sans-serif" font-size="14">workspace and backups.</text>
    </g>

    <g transform="translate(0 462)">
      <rect width="806" height="96" rx="22" fill="#27231D"/>
      <text x="30" y="38" fill="#F8F0E1" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Transparent lineage</text>
      <text x="30" y="68" fill="#D8CCB8" font-family="Inter, Arial, sans-serif" font-size="15">A deep RikkaHub fork, independently maintained as a non-commercial personal OSS project.</text>
    </g>
  </g>
</svg>
