name: Legacy Package Guard
on: [pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: New files must not land in me.rerere.*
        run: bash config/check-legacy-package.sh "origin/${{ github.base_ref }}"

      - name: Refactor state invariants must hold
        run: bash config/check-refactor-state.sh
